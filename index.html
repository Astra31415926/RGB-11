<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COLQR.G.B LAB</title>
    <!-- Библиотеки -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507; --panel: #0c0c12; --accent: #00ff9d;
            --r: #ff3e3e; --g: #00ff9d; --b: #0077ff; --text: #f0f0f0;
            --btn-h: 70px; --font-main: 18px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Space Grotesk', sans-serif; font-size: var(--font-main);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }
        
        /* Header & Nav */
        header { width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 50; }
        .logo { font-size: 28px; font-weight: 700; letter-spacing: 2px; cursor: default; display: flex; gap: 2px; }
        .logo span { transition: text-shadow 0.3s; }
        
        .menu-btn { background: none; border: none; color: var(--text); cursor: pointer; padding: 10px; }
        .menu-btn svg { width: 32px; height: 32px; }
        
        .menu-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100;
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; padding: 60px 30px 30px; gap: 30px;
        }
        .menu-overlay.open { transform: translateX(0); }
        .menu-close { align-self: flex-end; background: none; border: none; color: #fff; cursor: pointer; margin-bottom: 20px; }
        .menu-close svg { width: 40px; height: 40px; }
        .menu-item { font-size: 24px; color: #888; cursor: pointer; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .menu-item:hover { color: #fff; }
        
        .lang-switcher { display: flex; gap: 10px; margin-top: auto; }
        .lang-btn {
            padding: 12px 24px; font-family: inherit; font-weight: 700; font-size: 16px;
            background: transparent; border: 1px solid #333; color: #888; cursor: pointer; border-radius: 4px;
        }
        .lang-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,157,0.1); }

        /* Viewport */
        .viewport-container {
            position: relative; width: 90vw; height: 90vw; max-width: 500px; max-height: 500px;
            border: 2px solid #1a1a25; background: #000; overflow: hidden;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.05); margin-top: 10px;
        }
        .viewport-container.analyzing {
            width: 60vw; height: 60vw; max-width: 300px; max-height: 300px; 
            border-color: var(--accent); box-shadow: 0 0 50px rgba(0, 255, 157, 0.3); margin-bottom: 30px;
        }
        video, #freezeCanvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        
        .laser-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 6px;
            background: #fff; box-shadow: 0 0 20px 5px var(--g), 0 0 60px 10px var(--g);
            display: none; z-index: 10; opacity: 0;
        }
        .flash-overlay {
            position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 20;
        }

        /* Results Stack */
        .results-stack { width: 90%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; margin: 25px 0; }
        .channel-row {
            background: var(--panel); border: 1px solid #1a1a25; padding: 15px; border-radius: 8px;
            display: flex; flex-direction: column; gap: 8px; transition: 0.3s;
        }
        .channel-row.active { border-color: var(--clr); background: rgba(255,255,255,0.03); }
        .channel-header { display: flex; justify-content: space-between; align-items: center; }
        .channel-label { font-size: 14px; font-weight: 700; text-transform: uppercase; color: #444; }
        .channel-row.active .channel-label { color: var(--clr); }
        
        .channel-input {
            width: 100%; background: transparent; border: none; color: #666; resize: none;
            font-family: 'Space Grotesk', monospace; font-size: 16px; outline: none; min-height: 24px;
        }
        .channel-row.active .channel-input { color: #fff; }
        .channel-input::placeholder { color: #333; }
        
        .channel-actions { display: flex; gap: 10px; align-items: center; }
        .retry-btn, .open-url-btn {
            font-size: 12px; background: none; border: 1px solid #333; color: #666;
            padding: 4px 10px; border-radius: 4px; cursor: pointer; display: none; font-family: inherit;
        }
        .channel-row.scanned .retry-btn { display: block; }
        .channel-row.has-url .open-url-btn { display: block; color: var(--b); border-color: var(--b); }
        .retry-btn:hover { border-color: var(--clr); color: var(--clr); }

        /* Buttons */
        .btn-grid { width: 90%; max-width: 500px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding-bottom: 60px; }
        .btn {
            height: var(--btn-h); background: #111; border: 1px solid #222; color: #fff;
            font-family: inherit; font-weight: 600; cursor: pointer; border-radius: 8px;
            font-size: 16px; transition: 0.2s; display: flex; justify-content: center; align-items: center;
        }
        .btn:active { transform: scale(0.98); }
        .btn-upload { border-color: #333; }
        .btn-generate { background: var(--accent); color: #000; border: none; font-weight: 800; }
        .btn-reset { grid-column: span 2; background: #1a0000; border: 2px solid #ff3e3e; color: #ff3e3e; font-weight: 800; font-size: 18px; height: 80px; }

        @keyframes laserSweep {
            0% { top: 0%; opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <span style="color:var(--r)">C</span><span style="color:var(--g)">O</span><span style="color:var(--b)">L</span><span style="color:var(--r)">Q</span><span style="color:var(--g)">R</span><span style="color:var(--g)">.</span><span style="color:var(--g)">G</span><span style="color:var(--b)">.</span><span style="color:var(--b)">B</span>
        <span style="color:var(--b); margin-left:5px">L</span><span style="color:var(--r)">A</span><span style="color:var(--b)">B</span>
    </div>
    <button class="menu-btn" onclick="toggleMenu()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
</header>

<div class="menu-overlay" id="menuOverlay">
    <button class="menu-close" onclick="toggleMenu()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <div class="menu-item" onclick="alert('Автор: AI Assistant')">Автор</div>
    <div class="menu-item" onclick="alert('Наведіть камеру на QR. Система автоматично розділить його на RGB канали.')">Інструкція</div>
    <div class="menu-item" onclick="alert('github.com/example')">Контакти</div>
    <div class="lang-switcher">
        <button class="lang-btn active" id="btnUa" onclick="setLang('ua')">UA</button>
        <button class="lang-btn" id="btnEn" onclick="setLang('en')">EN</button>
    </div>
</div>

<div class="viewport-container" id="viewPort">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="freezeCanvas" style="display:none"></canvas>
    <div class="laser-line" id="laser"></div>
    <div class="flash-overlay" id="flash"></div>
</div>

<div class="results-stack">
    <div class="channel-row" id="row-0" style="--clr: var(--r)">
        <div class="channel-header">
            <div class="channel-label" data-i18n="ch_r">Червоний канал</div>
        </div>
        <textarea class="channel-input" id="txt-0" rows="1" placeholder=" "></textarea>
        <div class="channel-actions">
            <button class="retry-btn" data-i18n="retry" onclick="retryChannel(0)">Спробувати знову</button>
            <button class="open-url-btn" onclick="openUrl(0)">↗ URL</button>
        </div>
    </div>
    <div class="channel-row" id="row-1" style="--clr: var(--g)">
        <div class="channel-header">
            <div class="channel-label" data-i18n="ch_g">Зелений канал</div>
        </div>
        <textarea class="channel-input" id="txt-1" rows="1" placeholder=" "></textarea>
        <div class="channel-actions">
            <button class="retry-btn" data-i18n="retry" onclick="retryChannel(1)">Спробувати знову</button>
            <button class="open-url-btn" onclick="openUrl(1)">↗ URL</button>
        </div>
    </div>
    <div class="channel-row" id="row-2" style="--clr: var(--b)">
        <div class="channel-header">
            <div class="channel-label" data-i18n="ch_b">Синій канал</div>
        </div>
        <textarea class="channel-input" id="txt-2" rows="1" placeholder=" "></textarea>
        <div class="channel-actions">
            <button class="retry-btn" data-i18n="retry" onclick="retryChannel(2)">Спробувати знову</button>
            <button class="open-url-btn" onclick="openUrl(2)">↗ URL</button>
        </div>
    </div>
</div>

<div class="btn-grid">
    <button class="btn btn-upload" data-i18n="upload" onclick="document.getElementById('fileInput').click()">Завантажити фото</button>
    <button class="btn" data-i18n="cam_btn" onclick="startCamera()" id="camToggleBtn">Увімкнути камеру</button>
    <button class="btn btn-generate" data-i18n="generate" onclick="generateColorQR()">Згенерувати колірний QR</button>
    <button class="btn btn-reset" data-i18n="reset" onclick="resetAll()">СКИНУТИ ВСЕ (RESET)</button>
</div>

<input type="file" id="fileInput" style="display:none" accept="image/*">

<script>
    // --- ЛОКАЛИЗАЦИЯ ---
    let currentLang = 'ua';
    const i18n = {
        ua: {
            ch_r: 'Червоний канал', ch_g: 'Зелений канал', ch_b: 'Синій канал',
            retry: 'Спробувати знову', upload: 'Завантажити фото',
            cam_btn: 'Увімкнути камеру', generate: 'Згенерувати колірний QR',
            reset: 'СКИНУТИ ВСЕ (RESET)', placeholder: ' ', 
            failed: 'Не вдалося прочитати — спробувати ще'
        },
        en: {
            ch_r: 'Red Channel', ch_g: 'Green Channel', ch_b: 'Blue Channel',
            retry: 'Try again', upload: 'Upload photo',
            cam_btn: 'Start camera', generate: 'Generate Color QR',
            reset: 'RESET EVERYTHING', placeholder: ' ', 
            failed: 'Failed to read — try again'
        }
    };

    function setLang(lang) {
        currentLang = lang;
        document.getElementById('btnUa').classList.toggle('active', lang === 'ua');
        document.getElementById('btnEn').classList.toggle('active', lang === 'en');
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (i18n[lang][key]) el.innerText = i18n[lang][key];
        });
        // Обновляем плейсхолдеры и статус "не удалось прочитать" только если еще не сканировали
        for(let i=0; i<3; i++) {
            if(!scannedOnce[i]) document.getElementById(`txt-${i}`).placeholder = ' ';
        }
        toggleMenu();
    }

    function toggleMenu() {
        document.getElementById('menuOverlay').classList.toggle('open');
    }

    // --- СОСТОЯНИЕ ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const video = document.getElementById('video');
    const viewPort = document.getElementById('viewPort');
    const laser = document.getElementById('laser');
    const flash = document.getElementById('flash');
    const freezeCanvas = document.getElementById('freezeCanvas');
    const freezeCtx = freezeCanvas.getContext('2d');
    
    let isScanning = false;
    let cameraActive = false;
    let channelResults = [null, null, null];
    let scannedOnce = [false, false, false]; // Для логики подсказок
    let retryTarget = -1; // -1 = сканировать все, 0-2 = сканировать конкретный
    let lastTickTime = 0;
    const FPS_LIMIT = 1000 / 8; // Ограничение до 8 FPS для спасения батареи

    // --- ЗВУКИ И FX ---
    function playLaserDeep() {
        audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 1.8);
        g.gain.setValueAtTime(0.15, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.8);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 1.8);
    }

    function playSuccessTone() {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }

    // --- ЛОГИКА КАМЕРЫ ---
    function startCamera() {
        if (cameraActive) {
            // Если камера уже включена, не делаем ничего
            return;
        }
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: {ideal: 1280}, height: {ideal: 720} } })
        .then(stream => {
            video.srcObject = stream;
            cameraActive = true;
            video.onloadedmetadata = () => {
                video.play();
                resumeScanning();
                document.getElementById('camToggleBtn').style.opacity = '0.5';
                document.getElementById('camToggleBtn').style.pointerEvents = 'none';
            };
        }).catch(err => alert("Camera error: " + err.message));
    }

    function resumeScanning() {
        isScanning = true;
        video.style.display = 'block';
        freezeCanvas.style.display = 'none';
        viewPort.classList.remove('analyzing');
        laser.style.display = 'none'; laser.style.animation = 'none'; laser.style.opacity = '0';
        requestAnimationFrame(tick);
    }

    // --- ЗАГРУЗКА ФАЙЛОВ ---
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            const img = new Image();
            img.onload = function() {
                // Подготавливаем canvas для анализа
                freezeCanvas.width = 500; freezeCanvas.height = 500;
                freezeCtx.drawImage(img, 0, 0, 500, 500);
                freezeCanvas.style.display = 'block';
                video.style.display = 'none';
                viewPort.classList.add('analyzing');
                
                // Запускаем анализ загруженного изображения
                const imgData = freezeCtx.getImageData(0, 0, 500, 500);
                processImageData(imgData);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
        this.value = ''; // сброс для повторной загрузки того же файла
    });

    // --- ГЛАВНЫЙ ЦИКЛ ---
    function tick(timestamp) {
        if (!isScanning) return;
        
        // Ограничитель FPS
        if (timestamp - lastTickTime < FPS_LIMIT) {
            requestAnimationFrame(tick);
            return;
        }
        lastTickTime = timestamp;

        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            const w = video.videoWidth, h = video.videoHeight;
            const size = Math.min(w, h);
            const sx = (w - size) / 2, sy = (h - size) / 2;

            const tmpCvs = document.createElement('canvas');
            tmpCvs.width = 500; tmpCvs.height = 500;
            const tmpCtx = tmpCvs.getContext('2d');
            tmpCtx.drawImage(video, sx, sy, size, size, 0, 0, 500, 500);
            
            processImageData(tmpCtx.getImageData(0, 0, 500, 500));
        } else {
            requestAnimationFrame(tick);
        }
    }

    function processImageData(imgData) {
        let foundAny = false;
        let foundResults = {};

        for (let i = 0; i < 3; i++) {
            // Пропускаем уже найденные или нецелевые каналы при retry
            if (channelResults[i] !== null) continue;
            if (retryTarget !== -1 && retryTarget !== i) continue;

            const qr = jsQR(applyBradley(imgData, i), 500, 500);
            if (qr) {
                channelResults[i] = qr.data;
                foundResults[i] = qr.data;
                foundAny = true;
            }
        }

        if (foundAny) {
            isScanning = false; // Останавливаем цикл
            triggerCaptureAndFX(foundResults);
        } else {
            // Если мы пытались найти конкретный канал (retry) и не нашли - возвращаемся в обычный режим
            if (retryTarget !== -1) {
                scannedOnce[retryTarget] = true;
                updateRowUI(retryTarget, false);
                retryTarget = -1;
            }
            requestAnimationFrame(tick); // Продолжаем сканировать
        }
    }

    // --- FX И ТАЙМИНГ ---
    function triggerCaptureAndFX(results) {
        // 1. Заморозка кадра
        if (video.srcObject) {
            freezeCanvas.width = video.videoWidth;
            freezeCanvas.height = video.videoHeight;
            freezeCtx.drawImage(video, 0, 0);
        }
        video.style.display = 'none';
        freezeCanvas.style.display = 'block';
        viewPort.classList.add('analyzing');

        // 2. Запуск лазера строго синхронно со звуком
        laser.style.display = 'block';
        laser.style.opacity = '1';
        laser.style.animation = 'none';
        void laser.offsetWidth; // Принудительный reflow для перезапуска анимации
        laser.style.animation = 'laserSweep 1.8s forwards';
        playLaserDeep();

        // 3. Вспышка и вывод результата ТОЛЬКО после анимации
        setTimeout(() => {
            flash.style.transition = 'none';
            flash.style.opacity = '1';
            
            setTimeout(() => {
                flash.style.transition = 'opacity 0.3s ease-out';
                flash.style.opacity = '0';
            }, 50);

            playSuccessTone();
            
            // Обновляем UI ПОСЛЕ вспышки
            for (let ch in results) {
                updateRowUI(parseInt(ch), true);
            }
            retryTarget = -1; // Сбрасываем режим retry
        }, 1850); // 1850мс соответствует 90% анимации лазера (где он еще видим)
    }

    function updateRowUI(idx, success) {
        const row = document.getElementById(`row-${idx}`);
        const txt = document.getElementById(`txt-${idx}`);
        scannedOnce[idx] = true;
        
        row.classList.add('scanned');
        
        if (success) {
            row.classList.add('active');
            txt.value = channelResults[idx];
            autoResizeTextarea(txt);
            checkForUrl(txt.value, row);
        } else {
            row.classList.remove('active');
            txt.value = '';
            txt.placeholder = i18n[currentLang].failed;
        }
    }

    // --- ИНТЕРАКТИВНОСТЬ ---
    function retryChannel(idx) {
        if (channelResults[idx] !== null) return; // Нельзя перепроверить успешный
        
        // Очищаем текущий статус
        channelResults[idx] = null;
        scannedOnce[idx] = false;
        document.getElementById(`txt-${idx}`).value = '';
        document.getElementById(`txt-${idx}`).placeholder = ' ';
        document.getElementById(`row-${idx}`).classList.remove('active', 'scanned', 'has-url');

        retryTarget = idx; // Устанавливаем фокус только на этот канал
        
        if (cameraActive) {
            resumeScanning();
        } else {
            startCamera(); // Запустит камеру и resumeScanning
        }
    }

    function openUrl(idx) {
        const url = document.getElementById(`txt-${idx}`).value.trim();
        if (url) window.open(url, '_blank');
    }

    function checkForUrl(text, rowEl) {
        const isUrl = /^(https?:\/\/)|(www\.)/i.test(text);
        rowEl.classList.toggle('has-url', isUrl);
    }

    function autoResizeTextarea(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    // Слушаем ввод вручную для сброса состояния "ошибки"
    document.querySelectorAll('.channel-input').forEach((txt, idx) => {
        txt.addEventListener('input', function() {
            // Если пользователь ввел текст сам, считаем это ручным результатом
            if (this.value.trim() !== '') {
                channelResults[idx] = this.value;
                document.getElementById(`row-${idx}`).classList.add('active', 'scanned');
                checkForUrl(this.value, document.getElementById(`row-${idx}`));
            } else {
                channelResults[idx] = null;
                document.getElementById(`row-${idx}`).classList.remove('active', 'scanned', 'has-url');
            }
            autoResizeTextarea(this);
        });
    });

    // --- ГЕНЕРАЦИЯ ЦВЕТНОГО QR ---
    function generateColorQR() {
        const texts = [
            document.getElementById('txt-0').value.trim(),
            document.getElementById('txt-1').value.trim(),
            document.getElementById('txt-2').value.trim()
        ];

        if (texts.every(t => !t)) {
            alert(currentLang === 'ua' ? "Введіть текст хоча б в одне поле" : "Enter text in at least one field");
            return;
        }

        // Готовим viewport для показа
        viewPort.classList.add('analyzing');
        video.style.display = 'none';
        freezeCanvas.style.display = 'block';
        freezeCanvas.width = 500; freezeCanvas.height = 500;
        const ctx = freezeCtx;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, 500, 500);

        const colors = [
            [255, 0, 0],   // R
            [0, 255, 0],   // G
            [0, 0, 255]    // B
        ];

        let baseModuleCount = 0;

        texts.forEach((text, idx) => {
            if (!text) return;
            try {
                // typeNumber 0 = auto, ErrorCorrectionLevel 'L'
                const qr = qrcode(0, 'L');
                qr.addData(text);
                qr.make();

                const count = qr.getModuleCount();
                baseModuleCount = count; // Все сгенерированные коды будут выровнены по последнему (обычно одинаковый размер)
                
                const cellSize = Math.floor(500 / count);
                const offset = Math.floor((500 - cellSize * count) / 2);

                ctx.fillStyle = `rgb(${colors[idx].join(',')})`;
                
                for (let r = 0; r < count; r++) {
                    for (let c = 0; c < count; c++) {
                        if (qr.isDark(r, c)) {
                            ctx.fillRect(offset + c * cellSize, offset + r * cellSize, cellSize, cellSize);
                        }
                    }
                }
            } catch (e) {
                console.error("QR Gen Error (Text too long?):", e);
                alert("Error generating for channel " + (idx+1) + ". Text might be too long.");
            }
        });
    }

    // --- СБРОС ---
    function resetAll() {
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(t => t.stop());
            video.srcObject = null;
        }
        cameraActive = false;
        isScanning = false;
        retryTarget = -1;
        channelResults = [null, null, null];
        scannedOnce = [false, false, false];

        video.style.display = 'block';
        freezeCanvas.style.display = 'none';
        viewPort.classList.remove('analyzing');
        laser.style.display = 'none'; laser.style.animation = 'none'; laser.style.opacity = '0';
        flash.style.opacity = '0';

        for(let i=0; i<3; i++) {
            const row = document.getElementById(`row-${i}`);
            const txt = document.getElementById(`txt-${i}`);
            row.classList.remove('active', 'scanned', 'has-url');
            txt.value = '';
            txt.style.height = 'auto';
            txt.placeholder = ' ';
        }

        const camBtn = document.getElementById('camToggleBtn');
        camBtn.style.opacity = '1';
        camBtn.style.pointerEvents = 'auto';
    }

    // --- ИНИЦИАЛИЗАЦИЯ ---
    // Математика Брэдли-Рота (ОСТАВЛЕНА БЕЗ ИЗМЕНЕНИЙ)
    function applyBradley(sourceData, ch) {
        const w = 500, h = 500, input = sourceData.data;
        const output = new Uint8ClampedArray(w * h * 4);
        const intImg = new Int32Array(w * h);
        const s = 62, t = 15;
        for (let y = 0; y < h; y++) {
            let sum = 0;
            for (let x = 0; x < w; x++) {
                sum += input[(y * w + x) * 4 + ch];
                intImg[y * w + x] = (y > 0 ? intImg[(y - 1) * w + x] : 0) + sum;
            }
        }
        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const x1 = Math.max(x - s, 0), x2 = Math.min(x + s, w - 1);
                const y1 = Math.max(y - s, 0), y2 = Math.min(y + s, h - 1);
                const count = (x2 - x1) * (y2 - y1);
                const sum = intImg[y2 * w + x2] - intImg[y1 * w + x2] - intImg[y2 * w + x1] + intImg[y1 * w + x1];
                const val = input[(y * w + x) * 4 + ch];
                const final = (val * count < sum * (100 - t) / 100) ? 0 : 255;
                const idx = (y * w + x) * 4;
                output[idx] = output[idx+1] = output[idx+2] = final; output[idx+3] = 255;
            }
        }
        return output;
    }
